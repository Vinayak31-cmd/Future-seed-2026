<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – DOCWIN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">DOCWIN</div>
  <button class="nav-btn" onclick="adminLogout()">Logout</button>
</header>

<section class="doctors-section" id="loginSection">
  <h2>Admin Login</h2>
  <input id="adminPass" type="password" placeholder="Admin Password">
  <button class="orange" onclick="adminLogin()">Login</button>
</section>

<section class="doctors-section" id="adminPanel" style="display:none;">
  <h2>Add Doctor</h2>

  <div class="add-doctor-card">
    <input id="doctorName" placeholder="Doctor Name">
    <input id="speciality" placeholder="Speciality">
    <input id="experience" placeholder="Experience">
    <input id="photo" placeholder="Photo URL">

    <button class="orange" onclick="addDoctor()">+ Add Doctor</button>
  </div>
</section>

<script src="script.js"></script>

<script>
  if (sessionStorage.getItem("isAdmin") === "true") {
    loginSection.style.display = "none";
    adminPanel.style.display = "block";
  }
</script>

</body>
</html>
