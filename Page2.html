<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Doctors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">DOCWIN</div>
  <button class="nav-btn" onclick="window.location.href='admin.html'">
    Admin Login
  </button>
</header>

<section class="doctors-section">
  <h2>Our Doctors</h2>
  <div id="doctorList"></div>
</section>

<section class="doctors-section" id="bookingSection" style="display:none;">
  <h2>Book Appointment</h2>

  <div class="doctor-card">
    <p><strong>Doctor:</strong> <span id="bDoctor"></span></p>
    <p><strong>Speciality:</strong> <span id="bSpec"></span></p>

    <label>Day</label>
    <select id="bDay" onchange="updateTimeSlots()">
      <option value="">Select</option>
      <option value="Today">Today</option>
      <option value="Tomorrow">Tomorrow</option>
    </select>

    <label>Time</label>
    <select id="bTime"></select>

    <button class="orange" onclick="confirmBooking()">Confirm Appointment</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
